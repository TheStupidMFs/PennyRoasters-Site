<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Penny Coffee Roasters</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="nav">
    <a class="logo" href="#">
      <img src="assets/penny-logo.png" alt="Penny Coffee Roasters logo" />
    </a>

    <nav>
      <a href="#drinks">Drinks</a>
      <a href="#locations">Locations</a>
      <a href="#coffee">Coffee</a>
      <a href="#story">Story</a>
    </nav>

    <a class="nav-btn" href="#order">Order Now</a>
  </header>

  <main>
    <section class="hero" id="home">
      <div class="hero-content">
        <p class="eyebrow">Specialty Coffee • Fresh Roasted • Local Favorite</p>

        <h1>Coffee you can almost smell through the screen.</h1>

        <p class="hero-text">
          A warmer digital home for Penny Coffee Roasters, built around aroma,
          community, handcrafted drinks, and fresh roasted beans.
        </p>

        <div class="hero-buttons">
          <a
            class="btn primary"
            href="https://order.toasttab.com/online/penny-coffee-roasters-glendora-new-905-east-arrow-highway"
            target="_blank"
          >
            Order Glendora
          </a>

          <a
            class="btn secondary"
            href="https://order.toasttab.com/online/penny-coffee-roasters-azusa-ave-new-650-north-azusa-avenue"
            target="_blank"
          >
            Order Azusa
          </a>
        </div>
      </div>

      <div class="hero-image">
        <img src="assets/coffee.jpg" alt="Penny coffee cup" />
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
